name: EC2에 배포하기

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build the project
        env:
          MYSQL_ENDPOINT: ${{ secrets.MYSQL_ENDPOINT }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_ACCESS-KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_PRIVATE-KEY: ${{ secrets.AWS_PRIVATE_KEY }}
          AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: ./gradlew bootJar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Copy artifact to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # SSH 키를 파일로 저장합니다.
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          # 빌드된 JAR 파일을 EC2로 전송합니다.
          scp -o StrictHostKeyChecking=no -i private_key.pem build/libs/*.jar $EC2_USERNAME@$EC2_HOST:/home/ubuntu/app/

      - name: Restart application on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          # 기존 실행 중인 애플리케이션을 종료한 후 백그라운드에서 재실행합니다.
          ssh -o StrictHostKeyChecking=no -i private_key.pem $EC2_USERNAME@$EC2_HOST "pkill -f 'java -jar' || true; nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app.log 2>&1 &"
