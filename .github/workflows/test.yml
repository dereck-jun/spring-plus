name: EC2에 배포하기

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant permission
        run: chmod +x ./gradlew

      - name: Build project
        run: ./gradlew bootJar
        env:
          MYSQL_ENDPOINT=${{ secrets.MYSQL_ENDPOINT }}
          MYSQL_DB=${{ secrets.MYSQL_DB }}
          MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          AWS_ACCESS-KEY=${{ secrets.AWS_ACCESS_KEY }}
          AWS_PRIVATE-KEY=${{ secrets.AWS_PRIVATE_KEY }}
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}

      - name: Copy build files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST_BACK }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./build/libs/*.jar
          target: /home/ubuntu/

      - name: Run application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_BACK }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if lsof -i:8080 -t > /dev/null;
            then kill -9 $(lsof -i:8080 -t)
            fi
            nohup bash -c "source /home/ubuntu/.bashrc && java -jar /home/ubuntu/*.jar" > /home/ubuntu/log/app.log 2>&1 &