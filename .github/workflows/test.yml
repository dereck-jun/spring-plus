name: EC2에 배포하기

on:
  push:
    branches:
      - feat/**
      - fix/**
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: sudo chmod +x ./gradlew
      - name: Build gradle
        run: sudo ./gradlew clean build -x test
        env:
          MYSQL_ENDPOINT: ${{ secrets.MYSQL_ENDPOINT }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_ACCESS-KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_PRIVATE-KEY: ${{ secrets.AWS_PRIVATE_KEY }}
          AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}

      - name: Copy JAR file to EC2 server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "~"

      - name: Deploy application on EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            # 기존 실행 중인 애플리케이션 종료 (없을 경우 에러 무시)
            pkill -f 'java -jar' || true
            # 최신 jar 파일 실행 (프로덕션 프로파일을 예시로 사용)
            nohup java -jar $(ls -t *.jar | head -n 1) --spring.profiles.active=prod > app.log 2>&1 &